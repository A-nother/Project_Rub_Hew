<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        button { background-color: #D5C2A3; border: none; cursor: pointer; }
        pre { background-color: #f4f4f4; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>ทดสอบ API</h1>
    
    <h2>ลงทะเบียน</h2>
    <input type="text" id="username" placeholder="ชื่อผู้ใช้">
    <input type="email" id="email" placeholder="อีเมล">
    <input type="tel" id="phone" placeholder="เบอร์โทรศัพท์">
    <input type="password" id="password" placeholder="รหัสผ่าน">
    <input type="password" id="confirmPassword" placeholder="ยืนยันรหัสผ่าน">
    <button onclick="register()">ลงทะเบียน</button>
    
    <h2>ห้องเข้าสู่ระบบ</h2>
    <input type="text" id="loginUsername" placeholder="ชื่อผู้ใช้/อีเมล">
    <input type="password" id="loginPassword" placeholder="รหัสผ่าน">
    <button onclick="login()">เข้าสู่ระบบ</button>
    
    <h2>ผลลัพธ์</h2>
    <pre id="result"></pre>
    
    <script>
        async function register() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            try {
                const res = await fetch('http://localhost:4000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, phone, password, confirmPassword })
                });
                
                const data = await res.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('result').textContent = 'Error: ' + error.message;
            }
        }
        
        async function login() {
            const usernameOrEmail = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const res = await fetch('http://localhost:4000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usernameOrEmail, password })
                });
                
                const data = await res.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('result').textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
